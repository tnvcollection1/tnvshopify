<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNC Collection - Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
            font-family: 'Montserrat', sans-serif;
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 600px; }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 8px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #d4af37, #f4e5c2, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .tagline {
            font-size: 0.9rem;
            letter-spacing: 4px;
            color: #888;
            margin-bottom: 60px;
            text-transform: uppercase;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: 400;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        p {
            font-size: 1.1rem;
            color: #aaa;
            line-height: 1.8;
            margin-bottom: 40px;
            font-weight: 300;
        }
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 0 auto 40px;
        }
        .social {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }
        .social a {
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 2px;
            transition: color 0.3s;
        }
        .social a:hover { color: #d4af37; }
        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">TNC</div>
        <div class="tagline">Collection India</div>
        <div class="divider"></div>
        <h1>Coming Soon</h1>
        <p>We're crafting something extraordinary. Premium designer footwear, curated for the discerning gentleman.</p>
        <div class="social">
            <a href="https://instagram.com/tnvcollection">INSTAGRAM</a>
            <a href="mailto:info@tnvcollection.com">CONTACT</a>
        </div>
    </div>
    <div class="footer">© 2025 TNC Collection. All Rights Reserved.</div>
</body>
</html>
