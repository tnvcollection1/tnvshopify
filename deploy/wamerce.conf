# Default server (wamerce.com - ADMIN PANEL)
server {
    listen 80 default_server;
    server_name _ wamerce.com www.wamerce.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    server_name _ wamerce.com www.wamerce.com;
    
    ssl_certificate /etc/letsencrypt/live/wamerce.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wamerce.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    
    root /var/www/wamerce/admin-panel;
    index index.html;
    
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# API Backend
