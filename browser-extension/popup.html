<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WaMerce 1688 Importer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 380px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }
    
    .container {
      padding: 0;
    }
    
    /* Header */
    .header {
      background: rgba(255,255,255,0.15);
      padding: 16px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    
    .logo-icon {
      font-size: 28px;
    }
    
    .logo-text {
      font-size: 20px;
      font-weight: 700;
      color: white;
    }
    
    .version {
      font-size: 11px;
      color: rgba(255,255,255,0.7);
    }
    
    /* Connection Status */
    .connection-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: white;
      border-bottom: 1px solid #e5e5e5;
    }
    
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
    }
    
    .status-dot.connected { background: #22c55e; }
    .status-dot.error { background: #ef4444; }
    .status-dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    /* Server URL Input */
    .server-section {
      padding: 12px 16px;
      background: #f8f9fa;
      border-bottom: 1px solid #e5e5e5;
    }
    
    .server-input-group {
      display: flex;
      gap: 8px;
    }
    
    .server-input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
    }
    
    .server-input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .save-btn {
      padding: 8px 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    
    .save-btn:hover { background: #5a6fd6; }
    
    /* Main Content */
    .main-content {
      background: white;
      padding: 16px;
    }
    
    /* Page Detection */
    .page-info {
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
    }
    
    .page-info.store { background: #f0fdf4; border-color: #86efac; }
    .page-info.product { background: #fef3c7; border-color: #fcd34d; }
    .page-info.search { background: #ede9fe; border-color: #c4b5fd; }
    
    .page-type {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 4px;
    }
    
    .page-title {
      font-size: 13px;
      font-weight: 500;
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    /* Product Count */
    .product-count {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
      margin-bottom: 16px;
    }
    
    .count-number {
      font-size: 48px;
      font-weight: 700;
      color: white;
    }
    
    .count-label {
      font-size: 14px;
      color: rgba(255,255,255,0.9);
    }
    
    /* Action Buttons */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .action-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .action-btn.primary {
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      color: white;
    }
    
    .action-btn.primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
    }
    
    .action-btn.secondary {
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #e5e7eb;
    }
    
    .action-btn.secondary:hover:not(:disabled) {
      background: #e5e7eb;
    }
    
    .action-btn.danger {
      background: #fee2e2;
      color: #dc2626;
    }
    
    /* Options */
    .options {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e5e5e5;
    }
    
    .option-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    
    .option-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #667eea;
    }
    
    .option-row label {
      font-size: 13px;
      color: #555;
    }
    
    /* Product List */
    .product-list {
      max-height: 200px;
      overflow-y: auto;
      margin-top: 12px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
    }
    
    .product-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-bottom: 1px solid #f0f0f0;
      font-size: 12px;
    }
    
    .product-item:last-child { border-bottom: none; }
    
    .product-item img {
      width: 36px;
      height: 36px;
      object-fit: cover;
      border-radius: 4px;
      background: #f0f0f0;
    }
    
    .product-item .info {
      flex: 1;
      overflow: hidden;
    }
    
    .product-item .title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #333;
    }
    
    .product-item .price {
      color: #e53e3e;
      font-weight: 500;
    }
    
    /* Progress */
    .progress-section {
      margin-top: 16px;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 8px;
    }
    
    .progress-bar {
      height: 8px;
      background: #e5e5e5;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      transition: width 0.3s;
    }
    
    .progress-text {
      font-size: 12px;
      color: #666;
      text-align: center;
    }
    
    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      background: #333;
      color: white;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 1000;
    }
    
    .toast.show { opacity: 1; }
    .toast.success { background: #22c55e; }
    .toast.error { background: #ef4444; }
    
    /* Footer */
    .footer {
      padding: 12px 16px;
      background: #f8f9fa;
      border-top: 1px solid #e5e5e5;
      text-align: center;
    }
    
    .footer a {
      color: #667eea;
      text-decoration: none;
      font-size: 12px;
    }
    
    .footer a:hover { text-decoration: underline; }
    
    /* Not on 1688 */
    .not-1688 {
      text-align: center;
      padding: 40px 20px;
      background: white;
    }
    
    .not-1688 .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    .not-1688 h3 {
      color: #333;
      margin-bottom: 8px;
    }
    
    .not-1688 p {
      color: #666;
      font-size: 13px;
      margin-bottom: 16px;
    }
    
    .not-1688 .go-btn {
      display: inline-block;
      padding: 10px 20px;
      background: #667eea;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="logo">
        <span class="logo-icon">🛒</span>
        <span class="logo-text">WaMerce Importer</span>
      </div>
      <div class="version">v2.0 - Like Dianxiaomi, but yours!</div>
    </div>
    
    <!-- Connection Status -->
    <div class="connection-bar">
      <div class="status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Checking...</span>
      </div>
      <button class="save-btn" id="settingsBtn" style="padding: 4px 10px; font-size: 11px;">⚙️ Settings</button>
    </div>
    
    <!-- Server URL (hidden by default) -->
    <div class="server-section" id="serverSection" style="display: none;">
      <div class="server-input-group">
        <input type="text" class="server-input" id="serverUrl" placeholder="https://your-wamerce-url.com">
        <button class="save-btn" id="saveServer">Save</button>
      </div>
    </div>
    
    <!-- Main Content -->
    <div class="main-content" id="mainContent">
      <!-- Will be populated by JS -->
    </div>
    
    <!-- Footer -->
    <div class="footer">
      <a href="#" id="openDashboard">Open WaMerce Dashboard →</a>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>
  
  <script src="popup.js"></script>
</body>
</html>
